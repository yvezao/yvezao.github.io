# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the
# server process.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default" # The available themes options are "default", "air", "sunrise", "mint", "dirt" and "contrast"
title                    : "Wang Siying"
title_separator          : "-"
name                     : &name "Wang Siying"
description              : &description "Wang Siying — academic homepage (Computational Social Science, Computational Linguistics, Multi-agent Simulation)"   # Update this with a general description of your site, this is the default if not overridden by a page
url                      : https://yvezao.github.io # The base hostname & protocol for your site e.g. "https://[your GitHub username].github.io",
                                                           # or if you already have some other page hosted on Github then use "https://[your GitHub username].github.io/[Your Repo Name]"
baseurl                  : "" # the subpath of your site, e.g. "/blog"
repository               : "yvezao/yvezao.github.io"

# Site Author - The following control what appear as part of the author content on the side bar.
#               If a field is blank the icon and link will not appear, otherwise it will be shown.
#               Additional customization can be done by editing /_includes/author-profile.html
author:
  # Biographic information
  avatar           : "profile.jpg"
  name             : "Wang Siying"
  bio              : "MS/PhD student<br>Computational Social Science<br>Computational Linguistics<br>Multi-agent Simulation"
  location         : "Beijing, China"
  employer         : "Renmin University of China"
  award            : "National Scholarship (Undergraduate)"
  uri              : # URL
  email            : "sywang807@ruc.edu.cn"

  # Academic websites
  academia         : # URL
  arxiv            : # URL - Update with the correct link to your profile
  googlescholar    : "https://scholar.google.com/citations?user=WlOSYVcAAAAJ&hl=zh-CN&authuser=1"
  inspire-hep      : # URL
  impactstory      : # URL
  orcid            : "https://orcid.org/0009-0006-2835-3918"
  semantic         : # URL
  ssrn             : # URL
  pubmed           : # URL
  researchgate     : # URL
  scopus           : # URL
  zotero           : # URL


  # Repositories and software development
  bitbucket        : # Username - Update with your username on the site
  codepen          : # Username
  dribbble         : # Username
  github           : "yvezao"
  kaggle           : # Username
  stackoverflow    : # User number or user number and name (i.e., use "1" or "1/jeff-atwood")

  # Social media
  artstation       : # Username
  bluesky          : # Username
  facebook         : # Username
  flickr           : # Username
  foursquare       : # Username
  goodreads        : # Username
  google_plus      : # Username
  keybase          : # Username
  instagram        : # Username
  lastfm           : # Username
  linkedin         : # Username
  mastodon         : # URL
  medium           : # URL
  pinterest        : # Username
  soundcloud       : # Username
  steam            : # Username
  telegram         : # URL
  tumblr           : # Username
  twitter          : # Username for X / Twitter
  vine             : # Username
  weibo            : # Username
  wikipedia        : # Username
  xing             : # Username
  youtube          : # Username
  zhihu            : # Username

# Reading Files
include:
  - _pages

exclude:
  - .bundle
  - .jekyll-cache
  - .sass-cache
  - .github
  - Gemfile
  - Gemfile.lock
  - node_modules
  - package.json
  - package-lock.json
  - scripts
  - vendor

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai

# Plugins supported by GitHub Pages.
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Collections used by the Academic Pages template.
collections:
  publications:
    output: true
    permalink: /publication/:path/
  talks:
    output: true
    permalink: /talks/:path/
  teaching:
    output: true
    permalink: /teaching/:path/
  portfolio:
    output: true
    permalink: /portfolio/:path/

publication_category:
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true

atom_feed:
  hide: true

comments:
  provider: false

breadcrumbs: false
words_per_minute: 160
read_more: disabled

sass:
  sass_dir: _sass
  style: compressed
