  avatar           : "profile.jpg"
  name             : "Wang Siying"
  pronouns         : "she/her"
  bio              : "MS/PhD student · Computational Social Science · Computational Linguistics · Multi-agent Simulation"
  location         : "Beijing, China"
  employer         : "Renmin University of China"
  uri              : # URL
  email            : "1371874652@qq.com"

  # Academic websites
  academia         : # URL
  arxiv            : # URL - Update with the correct link to your profile
